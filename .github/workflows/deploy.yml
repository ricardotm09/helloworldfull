name: Build and Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  K8S_NAMESPACE: default
  IMAGE_REPOSITORY: click-counter
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -reconfigure

      - name: Terraform plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan -out=tfplan

      - name: Manual approval gate
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.actor }}
          minimum-approvals: 1
          issue-title: "Approve AKS deployment"
          issue-body: "Please review the Terraform plan and approve this deployment."

      - name: Terraform apply
        working-directory: terraform/environments/dev
        run: |
          terraform apply -auto-approve tfplan

      - name: Get deployment targets
        working-directory: terraform/environments/dev
        id: deploy_targets
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "aks_name=$(terraform output -raw aks_name)" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ steps.deploy_targets.outputs.acr_name }}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.deploy_targets.outputs.acr_login_server }}/click-counter:${{ env.IMAGE_TAG }}

      - name: Set AKS context
        run: |
          az aks get-credentials --resource-group "${{ steps.deploy_targets.outputs.resource_group_name }}" --name "${{ steps.deploy_targets.outputs.aks_name }}" --overwrite-existing

      - name: Deploy to AKS
        run: |
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/click-counter -n "${{ env.K8S_NAMESPACE }}" --timeout=180s
        env:
          IMAGE_NAME: ${{ steps.deploy_targets.outputs.acr_login_server }}/click-counter:${{ env.IMAGE_TAG }}
