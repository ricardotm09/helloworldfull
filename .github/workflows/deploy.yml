name: Build and Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aks-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  K8S_NAMESPACE: default
  IMAGE_REPOSITORY: click-counter
  IMAGE_TAG: ${{ github.sha }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure auth inputs
        run: |
          if [ -z "${{ env.AZURE_CLIENT_ID }}" ] || [ -z "${{ env.AZURE_TENANT_ID }}" ] || [ -z "${{ env.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "::error::Missing AZURE_CLIENT_ID, AZURE_TENANT_ID, or AZURE_SUBSCRIPTION_ID. Set them in Repository Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform format check
        working-directory: terraform/environments/dev
        run: |
          terraform fmt -check

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -reconfigure

      - name: Terraform validate
        working-directory: terraform/environments/dev
        run: |
          terraform validate

      - name: Terraform plan
        working-directory: terraform/environments/dev
        run: |
          terraform plan -out=tfplan

      - name: Export Terraform plan (human-readable)
        working-directory: terraform/environments/dev
        run: |
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: |
            terraform/environments/dev/tfplan
            terraform/environments/dev/tfplan.txt

  deploy:
    runs-on: ubuntu-latest
    needs: terraform-plan
    environment:
      name: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Azure auth inputs
        run: |
          if [ -z "${{ env.AZURE_CLIENT_ID }}" ] || [ -z "${{ env.AZURE_TENANT_ID }}" ] || [ -z "${{ env.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "::error::Missing AZURE_CLIENT_ID, AZURE_TENANT_ID, or AZURE_SUBSCRIPTION_ID. Set them in Repository Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Download Terraform plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: terraform/environments/dev

      - name: Terraform init
        working-directory: terraform/environments/dev
        run: |
          terraform init -reconfigure

      - name: Terraform apply
        working-directory: terraform/environments/dev
        run: |
          terraform apply -auto-approve tfplan

      - name: Get deployment targets
        working-directory: terraform/environments/dev
        id: deploy_targets
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "aks_name=$(terraform output -raw aks_name)" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "${{ steps.deploy_targets.outputs.acr_name }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.deploy_targets.outputs.acr_login_server }}/click-counter:${{ env.IMAGE_TAG }}

      - name: Set AKS context
        run: |
          az aks get-credentials --resource-group "${{ steps.deploy_targets.outputs.resource_group_name }}" --name "${{ steps.deploy_targets.outputs.aks_name }}" --overwrite-existing

      - name: Deploy to AKS
        run: |
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/click-counter -n "${{ env.K8S_NAMESPACE }}" --timeout=180s
        env:
          IMAGE_NAME: ${{ steps.deploy_targets.outputs.acr_login_server }}/click-counter:${{ env.IMAGE_TAG }}

      - name: Resolve service endpoint
        id: service_endpoint
        run: |
          for attempt in $(seq 1 20); do
            service_ip=$(kubectl get svc click-counter -n "${{ env.K8S_NAMESPACE }}" -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            service_hostname=$(kubectl get svc click-counter -n "${{ env.K8S_NAMESPACE }}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

            if [ -n "$service_ip" ]; then
              echo "url=http://$service_ip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ -n "$service_hostname" ]; then
              echo "url=http://$service_hostname" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Waiting for LoadBalancer endpoint... attempt $attempt/20"
            sleep 15
          done

          echo "::error::Timed out waiting for the AKS service external endpoint."
          exit 1

      - name: Smoke test deployment
        run: |
          curl --fail --silent --show-error "${{ steps.service_endpoint.outputs.url }}/health/ready"
