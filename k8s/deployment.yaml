apiVersion: apps/v1
kind: Deployment
metadata:
  name: click-counter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: click-counter
  template:
    metadata:
      labels:
        app: click-counter
    spec:
      containers:
        - name: click-counter
          image: ${IMAGE_NAME}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: click-counter
spec:
  selector:
    app: click-counter
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
