apiVersion: apps/v1
kind: Deployment
metadata:
  name: click-counter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: click-counter
  template:
    metadata:
      labels:
        app: click-counter
    spec:
      containers:
        - name: click-counter
          image: ${IMAGE_NAME}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: click-counter
spec:
  selector:
    app: click-counter
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
